<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>array 비파괴 메서드</title>
  </head>
  <body>
    <script>
      const arr = [1, 2, 3, 4, 5];

      // 1. map() : 배열의 각 요소를 가공해서 새로운 배열로 반환하는 반복 메서드
      console.log(
        `map : ${arr.map((x) => {
          return x * 2;
        })}`,
      );
      // = "x * 2의 결과값을 반환"
      // 출력 = map : 2,4,6,8,10

      // 2. filter() : 조건에 맞는 요소만 골라서 새로운 배열을 만드는 메서드
      console.log(
        `filter : ${arr.filter((x) => {
          return x > 2;
        })}`,
      );
      // = "2보다 작은 x의 값만 반환"
      // 출력 = filter : 3,4,5

      // 3. find() : 조건에 맞는 요소를 찾아 첫 번째 요소만 반환하는 메서드
      console.log(
        `find : ${arr.find((x) => {
          return x > 3;
        })}`,
      );
      // = "3보다 큰 x값 중 첫번째 값만 반환"
      // 출력 = find : 4

      // 4. indexOf() : 특정 값이 몇 번째(index)에 있는지 찾는 메서드 (2)
      console.log(`indexOf : ${arr.indexOf(4)}`);
      // 출력 = indexOf : 3

      // 5. includes() : 배열이나 문자열 안에 특정 값이 포함되어 있는지 확인하는 메서드
      console.log(`includes : ${arr.includes(3)}`);
      //  출력 = includes : true

      // 6. join() : join() : 배열을 문자열로 변환하는 메서드 (2)
      console.log(`join : ${arr.join("-")}`);
      // 출력 = join : 1-2-3-4-5

      // 7. forEach() : 배열의 요소를 하나씩 순서대로 꺼내서 반복 실행하는 메서드 (2)
      arr.forEach((a) => {
        console.log(a * 3);
      });
      // 출력 = 3/6/9/12/15
    </script>
  </body>
</html>
