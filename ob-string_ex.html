<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>object - string 문자열 예제</title>
  </head>
  <style>
    body {
      font-family: sans-serif;
      padding: 30px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      display: block;
      width: 300px;
      padding: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: white;
      border-radius: 10px;
    }

    .tag {
      color: blue;
    }
  </style>
  <body>
    <h2>회원 정보 입력</h2>
    <input type="text" id="name" placeholder="이름 입력 (예 : hong)" />
    <input type="text" id="email" placeholder="이메일 입력" />
    <input
      type="text"
      id="hobby"
      placeholder="관심사 입력 (예 : 게임, 운동, 코딩)"
    />
    <button id="btn">확인</button>
    <div id="result">
      <!-- js 출력 -->
      <!-- <p>이름 : </p>
       <p>이메일 확인</p>
       <p>이메일 형식에 맞지 않습니다.</p>
       <p>관심사 : </p> -->
    </div>

    <script>
      const btn = document.getElementById("btn");
      const result = document.getElementById("result");

      // 확인 버튼을 누르면 ...
      btn.addEventListener("click", () => {
        const name = document.getElementById("name").value; // value = 입력값 출력
        const email = document.getElementById("email").value;
        const hobby = document.getElementById("hobby").value;
        // console.log(name, email, hobby);

        // 1. 이름 : 앞뒤 공백 삭제 = trim(),  대문자 출력 = toUpperCase()
        const cleanName = name.trim().toUpperCase();

        // 2. 이메일 : @ 포함 여부 = includes()
        const isEmail = email.includes("@");

        // 3. 관심사 : ,(쉼표) 기점으로 나누기 = split()
        const hobbyList = hobby.split(",");

        // 4. result = 결과 출력
        let html = ""; // 임의로 설정
        // 이름
        html += `<p>이름 : ${cleanName}</p>`;
        // 이메일
        if (isEmail) {
          html += `<p style = "color:green">이메일 확인</p>`;
        } else {
          html += `<p style = "color:red">이메일 형식에 맞지 않습니다.</p>`;
        }
        // 관심사 -> forEach 사용 (여러 개)
        html += `<p>관심사 : </p>`;
        hobbyList.forEach((item) => {
          html += `<span class="tag"> ${item.trim()} </span>`; // item 앞뒤 공백 삭제
        });
        // 화면 출력
        result.innerHTML = html;
      });
    </script>
  </body>
</html>
