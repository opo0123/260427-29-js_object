<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <title>object - date 예제1 - 상품리스트</title>
  </head>
  <style>
    #product-list {
      display: flex;
      gap: 10px;
    }
    .product {
      border: 1px solid #eee;
      padding: 10px;
    }
  </style>
  <body>
    <h1>상품 리스트</h1>
    <div id="product-list">
      <!-- js 출력 -->
      <!-- <div class="product">
        <h3>상품명 : </h3>
        <p>등록일 : </p>
       </div> -->
    </div>

    <script>
      // 상품 더미 데이터
      const products = [
        { name: "노트북", date: new Date() },
        { name: "스마트폰", date: new Date() },
        { name: "TV", date: new Date() },
      ];

      const productList = document.querySelector("#product-list");
      products.forEach((prod) => {
        // console.log(prod); // products가 따로 찍히면 정상
        productList.innerHTML += `<div class="product">
        <h3>상품명 : ${prod.name}</h3>
        <p>등록일 : ${prod.date.toLocaleDateString()}</p>
       </div>`;
      });
    </script>
  </body>
</html>
