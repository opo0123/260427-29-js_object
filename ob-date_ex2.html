<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <title>object - date 예제2 - 날짜 선택 및 기록</title>
    <style>
      :root {
        --primary-color: #5cc45f;
        --primary-hover-color: #42a145;
        --secondary-color: #ff9800;
        --bg-color: #f4f4f4;
        --text-white-color: #fff;
        --text-color: #333;
        --font-family: "Segoe UI", sans-serif;
        /* 간격 */
        --space-s: 10px;
        --space-m: 15px;
        --space-l: 20px;
        --space-xl: 50px;
        /* 그림자 */
        --shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: var(--font-family);
      }
      header {
        background-color: var(--primary-color);
        color: var(--text-white-color);
        padding: var(--space-l);
        text-align: center;
      }
      .container {
        width: 50%;
        margin: var(--space-xl) auto;
      }
      .card {
        background-color: var(--text-white-color);
        padding: var(--space-m);
        border-radius: 12px;
        box-shadow: var(--shadow);
      }
      h2 {
        color: var(--primary-color);
      }
      #date-form {
        display: flex;
        flex-direction: column;
        gap: var(--space-s);
        margin-top: var(--space-m);
      }
      input,
      button {
        padding: var(--space-s);
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 16px;
      }
      button {
        background-color: var(--primary-color);
        color: var(--text-white-color);
        cursor: pointer;
      }
      button:hover {
        background-color: var(--primary-hover-color);
      }
      .log {
        background-color: #eee;
        padding: var(--space-s);
        margin-top: var(--space-m);
        border-radius: 6px;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Date 객체 활용 날짜 선택하기</h1>
    </header>
    <div class="container">
      <div class="card">
        <h2>날짜 선택 및 기록</h2>
        <form class="date-form" id="date-form">
          <label for="date">날짜 선택 :</label>
          <input type="date" name="date" id="userDate" />
          <button type="submit">기록하기</button>
        </form>

        <div class="log" id="log">
          <!-- js 출력 -->
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("date-form");
      const log = document.getElementById("log");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        // 사용자가 선택한 날짜
        const userDate = document.getElementById("userDate").value;
        // console.log(userDate);

        // 사용자가 등록한 날짜
        const now = new Date().toLocaleDateString();
        // console.log(now);

        log.innerHTML += `<p>
            <strong>선택된 날짜 : ${userDate}</strong> <br>
            (등록 날짜 : ${now})
           </p>
           <hr>`;
           
        // input 초기화
        document.getElementById("userDate").value = "";
      });
    </script>
  </body>
</html>
